aid: koyeb
name: Koyeb
description: >-
  Koyeb is a developer-friendly serverless platform for deploying apps globally.
  The Koyeb API allows you to interact with the Koyeb platform in a simple,
  programmatic way using conventional HTTP requests for managing apps,
  services, deployments, and secrets.
