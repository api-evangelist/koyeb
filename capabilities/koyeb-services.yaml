naftiko: 1.0.0-alpha2
info:
  label: Koyeb Rest API — Services
  description: 'Koyeb Rest API — Services. 14 operations. Lead operation: List Service events. Self-contained Naftiko capability
    covering one Koyeb business surface.'
  tags:
  - Koyeb
  - Services
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KOYEB_API_KEY: KOYEB_API_KEY
capability:
  consumes:
  - type: http
    namespace: koyeb-services
    baseUri: https://app.koyeb.com
    description: Koyeb Rest API — Services business capability. Self-contained, no shared references.
    resources:
    - name: v1-service_events
      path: /v1/service_events
      operations:
      - name: listserviceevents
        method: GET
        description: List Service events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: service_id
          in: query
          type: string
          description: (Optional) Filter on service id
        - name: types
          in: query
          type: array
          description: (Optional) Filter on service event types
        - name: limit
          in: query
          type: string
          description: (Optional) The number of items to return
        - name: offset
          in: query
          type: string
          description: (Optional) The offset in the list of item to return
        - name: order
          in: query
          type: string
          description: (Optional) Sorts the list in the ascending or the descending order
    - name: v1-services
      path: /v1/services
      operations:
      - name: listservices
        method: GET
        description: List Services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: app_id
          in: query
          type: string
          description: (Optional) The id of the app
        - name: limit
          in: query
          type: string
          description: (Optional) The number of items to return
        - name: offset
          in: query
          type: string
          description: (Optional) The offset in the list of item to return
        - name: name
          in: query
          type: string
          description: (Optional) A filter for name
        - name: types
          in: query
          type: array
          description: (Optional) Filter on service types
        - name: statuses
          in: query
          type: array
          description: (Optional) Filter on service statuses
        - name: regions
          in: query
          type: array
          description: (Optional) Filter on regions
        - name: project_id
          in: query
          type: string
          description: (Optional) A filter for the project ID
      - name: createservice
        method: POST
        description: Create Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: service
          in: body
          type: string
          required: true
        - name: dry_run
          in: query
          type: boolean
          description: If set only run validation
    - name: v1-services-autocomplete
      path: /v1/services-autocomplete
      operations:
      - name: autocomplete
        method: POST
        description: Autocomplete definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: string
          required: true
    - name: v1-services-id
      path: /v1/services/{id}
      operations:
      - name: getservice
        method: GET
        description: Get Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the Service
          required: true
      - name: deleteservice
        method: DELETE
        description: Delete Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the entity to delete
          required: true
      - name: updateservice
        method: PUT
        description: Update Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the entity to update
          required: true
        - name: service
          in: body
          type: string
          required: true
        - name: update_mask
          in: query
          type: string
        - name: dry_run
          in: query
          type: boolean
          description: If set, run validation and check that the service exists
      - name: updateservice2
        method: PATCH
        description: Update Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the entity to update
          required: true
        - name: service
          in: body
          type: string
          required: true
        - name: update_mask
          in: query
          type: string
        - name: dry_run
          in: query
          type: boolean
          description: If set, run validation and check that the service exists
    - name: v1-services-id-pause
      path: /v1/services/{id}/pause
      operations:
      - name: pauseservice
        method: POST
        description: Pause Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the service to pause.
          required: true
    - name: v1-services-id-redeploy
      path: /v1/services/{id}/redeploy
      operations:
      - name: redeploy
        method: POST
        description: ReDeploy Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: info
          in: body
          type: string
          required: true
    - name: v1-services-id-resume
      path: /v1/services/{id}/resume
      operations:
      - name: resumeservice
        method: POST
        description: Resume Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the service to pause.
          required: true
        - name: skip_build
          in: query
          type: boolean
          description: If set to true, the build stage will be skipped and the image coming from the last successful build
            step will be used instead.
        - name: use_cache
          in: query
          type: boolean
    - name: v1-services-id-scale
      path: /v1/services/{id}/scale
      operations:
      - name: getservicescaling
        method: GET
        description: Get Service Scaling
        outputRawFormat: json
        outputParameters:
