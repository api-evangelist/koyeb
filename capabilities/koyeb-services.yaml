          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the service
          required: true
      - name: deleteservicescaling
        method: DELETE
        description: Delete Service Scaling
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
