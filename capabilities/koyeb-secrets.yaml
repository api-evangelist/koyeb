      path: /v1/secrets/{id}/reveal
      operations:
      - name: revealsecret
        method: POST
        description: Reveal Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
  exposes:
  - type: rest
    namespace: koyeb-secrets-rest
    port: 8080
    description: REST adapter for Koyeb Rest API — Secrets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/secrets
      name: v1-secrets
      description: REST surface for v1-secrets.
      operations:
      - method: GET
        name: listsecrets
        description: List Secrets
        call: koyeb-secrets.listsecrets
        with:
          name: rest.name
          limit: rest.limit
          offset: rest.offset
          types: rest.types
          project_id: rest.project_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsecret
        description: Create Secret
        call: koyeb-secrets.createsecret
        with:
          secret: rest.secret
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/secrets/{id}
      name: v1-secrets-id
      description: REST surface for v1-secrets-id.
      operations:
      - method: GET
        name: getsecret
        description: Get Secret
        call: koyeb-secrets.getsecret
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesecret
        description: Delete Secret
        call: koyeb-secrets.deletesecret
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesecret
        description: Update Secret
        call: koyeb-secrets.updatesecret
        with:
          id: rest.id
          secret: rest.secret
          update_mask: rest.update_mask
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatesecret2
        description: Update Secret
        call: koyeb-secrets.updatesecret2
        with:
          id: rest.id
          secret: rest.secret
          update_mask: rest.update_mask
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/secrets/{id}/reveal
      name: v1-secrets-id-reveal
      description: REST surface for v1-secrets-id-reveal.
