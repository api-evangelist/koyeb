  - type: http
    namespace: koyeb-secrets
    baseUri: https://app.koyeb.com
    description: Koyeb Rest API — Secrets business capability. Self-contained, no shared references.
    resources:
    - name: v1-secrets
      path: /v1/secrets
      operations:
      - name: listsecrets
        method: GET
        description: List Secrets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
        - name: limit
          in: query
          type: string
        - name: offset
          in: query
          type: string
        - name: types
          in: query
          type: array
          description: Filter by secret types
        - name: project_id
          in: query
          type: string
          description: (Optional) A filter for the project ID
      - name: createsecret
        method: POST
        description: Create Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: secret
          in: body
          type: string
          required: true
    - name: v1-secrets-id
      path: /v1/secrets/{id}
      operations:
      - name: getsecret
        method: GET
        description: Get Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: deletesecret
        method: DELETE
        description: Delete Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: updatesecret
        method: PUT
        description: Update Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: secret
          in: body
          type: string
          required: true
        - name: update_mask
          in: query
          type: string
      - name: updatesecret2
        method: PATCH
        description: Update Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: secret
          in: body
          type: string
          required: true
        - name: update_mask
          in: query
          type: string
