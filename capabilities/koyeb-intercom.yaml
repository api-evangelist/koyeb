naftiko: 1.0.0-alpha2
info:
  label: Koyeb Rest API — Intercom
  description: 'Koyeb Rest API — Intercom. 1 operations. Lead operation: Get intercom profile. Self-contained Naftiko capability
    covering one Koyeb business surface.'
  tags:
  - Koyeb
  - Intercom
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KOYEB_API_KEY: KOYEB_API_KEY
capability:
  consumes:
  - type: http
    namespace: koyeb-intercom
    baseUri: https://app.koyeb.com
    description: Koyeb Rest API — Intercom business capability. Self-contained, no shared references.
    resources:
    - name: v1-intercom-profile
      path: /v1/intercom/profile
      operations:
      - name: getintercomprofile
        method: GET
        description: Get intercom profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: koyeb-intercom-rest
    port: 8080
    description: REST adapter for Koyeb Rest API — Intercom. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/intercom/profile
      name: v1-intercom-profile
      description: REST surface for v1-intercom-profile.
      operations:
      - method: GET
        name: getintercomprofile
        description: Get intercom profile
        call: koyeb-intercom.getintercomprofile
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: koyeb-intercom-mcp
    port: 9090
    transport: http
    description: MCP adapter for Koyeb Rest API — Intercom. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-intercom-profile
      description: Get intercom profile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: koyeb-intercom.getintercomprofile
      outputParameters:
      - type: object
        mapping: $.
