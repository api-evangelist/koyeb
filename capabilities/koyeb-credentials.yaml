    resources:
    - name: v1-credentials
      path: /v1/credentials
      operations:
      - name: listcredentials
        method: GET
        description: List credentials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: (Optional) A filter for type
        - name: name
          in: query
          type: string
          description: (Optional) A filter for name
        - name: organization_id
          in: query
          type: string
          description: (Optional) Filter for an organization
        - name: user_id
          in: query
          type: string
          description: (Optional) Filter for an user
        - name: limit
          in: query
          type: string
          description: (Optional) The number of items to return
        - name: offset
          in: query
          type: string
          description: (Optional) The offset in the list of item to return
      - name: createcredential
        method: POST
        description: Create credential
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: credential
          in: body
          type: string
          required: true
    - name: v1-credentials-id
      path: /v1/credentials/{id}
      operations:
      - name: getcredential
        method: GET
        description: Get credential
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: deletecredential
        method: DELETE
        description: Delete credential
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: updatecredential
        method: PUT
        description: Update credential
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: credential
          in: body
          type: string
          required: true
        - name: update_mask
          in: query
          type: string
      - name: updatecredential2
        method: PATCH
        description: Update credential
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: credential
          in: body
          type: string
          required: true
        - name: update_mask
          in: query
          type: string
  exposes:
