      name: v1-app-events
      description: REST surface for v1-app_events.
      operations:
      - method: GET
        name: listappevents
        description: List App events
        call: koyeb-apps.listappevents
        with:
          app_id: rest.app_id
          types: rest.types
          limit: rest.limit
          offset: rest.offset
          order: rest.order
        outputParameters:
        - type: object
          mapping: $.
