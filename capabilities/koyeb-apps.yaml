    namespace: koyeb-apps
    baseUri: https://app.koyeb.com
    description: Koyeb Rest API — Apps business capability. Self-contained, no shared references.
    resources:
    - name: v1-app_events
      path: /v1/app_events
      operations:
      - name: listappevents
        method: GET
        description: List App events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: app_id
          in: query
          type: string
          description: (Optional) Filter on app id
        - name: types
          in: query
          type: array
          description: (Optional) Filter on app event types
        - name: limit
          in: query
          type: string
          description: (Optional) The number of items to return
        - name: offset
          in: query
          type: string
          description: (Optional) The offset in the list of item to return
        - name: order
          in: query
          type: string
          description: (Optional) Sorts the list in the ascending or the descending order
    - name: v1-apps
      path: /v1/apps
      operations:
      - name: listapps
        method: GET
        description: List App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: string
          description: (Optional) The number of items to return
        - name: offset
          in: query
          type: string
          description: (Optional) The offset in the list of item to return
        - name: name
          in: query
          type: string
          description: (Optional) A filter for name
        - name: project_id
          in: query
          type: string
          description: (Optional) A filter for the project ID
      - name: createapp
        method: POST
        description: Create App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: app
          in: body
          type: string
          required: true
    - name: v1-apps-id
      path: /v1/apps/{id}
      operations:
      - name: getapp
        method: GET
        description: Get App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the App
          required: true
      - name: deleteapp
        method: DELETE
        description: Delete App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the App to delete
          required: true
      - name: updateapp
        method: PUT
        description: Update App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the app to update.
          required: true
        - name: app
          in: body
          type: string
          required: true
        - name: update_mask
          in: query
          type: string
      - name: updateapp2
        method: PATCH
        description: Update App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the app to update.
          required: true
        - name: app
          in: body
          type: string
          required: true
        - name: update_mask
          in: query
          type: string
    - name: v1-apps-id-pause
      path: /v1/apps/{id}/pause
      operations:
      - name: pauseapp
        method: POST
        description: Pause App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the app to pause.
          required: true
    - name: v1-apps-id-resume
      path: /v1/apps/{id}/resume
      operations:
      - name: resumeapp
        method: POST
        description: Resume App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The id of the app to resume.
          required: true
  exposes:
  - type: rest
