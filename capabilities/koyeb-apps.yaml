      - method: GET
        name: getapp
        description: Get App
        call: koyeb-apps.getapp
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapp
        description: Delete App
        call: koyeb-apps.deleteapp
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateapp
        description: Update App
        call: koyeb-apps.updateapp
        with:
          id: rest.id
          app: rest.app
          update_mask: rest.update_mask
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateapp2
        description: Update App
        call: koyeb-apps.updateapp2
        with:
          id: rest.id
          app: rest.app
          update_mask: rest.update_mask
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/apps/{id}/pause
      name: v1-apps-id-pause
      description: REST surface for v1-apps-id-pause.
      operations:
      - method: POST
        name: pauseapp
        description: Pause App
        call: koyeb-apps.pauseapp
        with:
