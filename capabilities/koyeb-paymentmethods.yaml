        destructive: false
        idempotent: false
      call: koyeb-paymentmethods.createpaymentauthorization
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payment-method
      description: Get payment method
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: koyeb-paymentmethods.getpaymentmethod
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-payment-method
      description: Delete payment method
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: koyeb-paymentmethods.deletepaymentmethod
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: confirm-payment-authorization
      description: Confirm payment authorization
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: koyeb-paymentmethods.confirmpaymentauthorization
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
