naftiko: 1.0.0-alpha2
info:
  label: Koyeb Rest API — Compose
  description: 'Koyeb Rest API — Compose. 1 operations. Lead operation: Create resources from compose.. Self-contained Naftiko
    capability covering one Koyeb business surface.'
  tags:
  - Koyeb
  - Compose
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KOYEB_API_KEY: KOYEB_API_KEY
capability:
  consumes:
  - type: http
    namespace: koyeb-compose
    baseUri: https://app.koyeb.com
    description: Koyeb Rest API — Compose business capability. Self-contained, no shared references.
    resources:
    - name: v1-compose
      path: /v1/compose
      operations:
      - name: compose
        method: POST
        description: Create resources from compose.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: compose
          in: body
          type: string
          required: true
  exposes:
  - type: rest
    namespace: koyeb-compose-rest
    port: 8080
    description: REST adapter for Koyeb Rest API — Compose. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/compose
      name: v1-compose
      description: REST surface for v1-compose.
      operations:
      - method: POST
        name: compose
        description: Create resources from compose.
        call: koyeb-compose.compose
        with:
          compose: rest.compose
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: koyeb-compose-mcp
    port: 9090
    transport: http
    description: MCP adapter for Koyeb Rest API — Compose. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-resources-compose
      description: Create resources from compose.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: koyeb-compose.compose
      with:
        compose: tools.compose
      outputParameters:
      - type: object
        mapping: $.
