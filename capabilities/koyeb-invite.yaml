naftiko: 1.0.0-alpha2
info:
  label: Koyeb Rest API — invite
  description: 'Koyeb Rest API — invite. 1 operations. Lead operation: invite. Self-contained Naftiko capability covering
    one Koyeb business surface.'
  tags:
  - Koyeb
  - invite
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KOYEB_API_KEY: KOYEB_API_KEY
capability:
  consumes:
  - type: http
    namespace: koyeb-invite
    baseUri: https://app.koyeb.com
    description: Koyeb Rest API — invite business capability. Self-contained, no shared references.
    resources:
    - name: v1-account-invite
      path: /v1/account/invite
      operations:
      - name: createinvite
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: string
          required: true
  exposes:
  - type: rest
    namespace: koyeb-invite-rest
    port: 8080
    description: REST adapter for Koyeb Rest API — invite. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/account/invite
      name: v1-account-invite
      description: REST surface for v1-account-invite.
      operations:
      - method: POST
        name: createinvite
        description: createinvite
        call: koyeb-invite.createinvite
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: koyeb-invite-mcp
    port: 9090
    transport: http
    description: MCP adapter for Koyeb Rest API — invite. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: createinvite
      description: createinvite
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: koyeb-invite.createinvite
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
