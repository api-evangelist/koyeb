naftiko: 1.0.0-alpha2
info:
  label: Koyeb Rest API — Sessions
  description: 'Koyeb Rest API — Sessions. 4 operations. Lead operation: Login user. Self-contained Naftiko capability covering
    one Koyeb business surface.'
  tags:
  - Koyeb
  - Sessions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KOYEB_API_KEY: KOYEB_API_KEY
capability:
  consumes:
  - type: http
    namespace: koyeb-sessions
    baseUri: https://app.koyeb.com
    description: Koyeb Rest API — Sessions business capability. Self-contained, no shared references.
    resources:
    - name: v1-account-login
      path: /v1/account/login
      operations:
      - name: login
        method: POST
        description: Login user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: string
          required: true
        - name: seon-fp
          in: header
          type: string
          description: Seon Fingerprint
    - name: v1-account-logout
      path: /v1/account/logout
      operations:
      - name: logout
        method: DELETE
        description: Logout user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-account-refresh
      path: /v1/account/refresh
      operations:
      - name: refreshtoken
        method: PUT
        description: Refresh token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-account-session
      path: /v1/account/session
      operations:
      - name: newsession
        method: POST
        description: New session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: koyeb-sessions-rest
    port: 8080
    description: REST adapter for Koyeb Rest API — Sessions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/account/login
      name: v1-account-login
      description: REST surface for v1-account-login.
      operations:
      - method: POST
        name: login
        description: Login user
        call: koyeb-sessions.login
        with:
          body: rest.body
          seon-fp: rest.seon-fp
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/account/logout
      name: v1-account-logout
      description: REST surface for v1-account-logout.
      operations:
      - method: DELETE
        name: logout
        description: Logout user
        call: koyeb-sessions.logout
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/account/refresh
      name: v1-account-refresh
      description: REST surface for v1-account-refresh.
      operations:
      - method: PUT
        name: refreshtoken
        description: Refresh token
        call: koyeb-sessions.refreshtoken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/account/session
      name: v1-account-session
      description: REST surface for v1-account-session.
      operations:
      - method: POST
        name: newsession
        description: New session
        call: koyeb-sessions.newsession
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: koyeb-sessions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Koyeb Rest API — Sessions. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: login-user
      description: Login user
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: koyeb-sessions.login
      with:
        body: tools.body
        seon-fp: tools.seon-fp
      outputParameters:
      - type: object
        mapping: $.
    - name: logout-user
      description: Logout user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: koyeb-sessions.logout
      outputParameters:
      - type: object
        mapping: $.
    - name: refresh-token
      description: Refresh token
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: koyeb-sessions.refreshtoken
      outputParameters:
      - type: object
        mapping: $.
    - name: new-session
      description: New session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: koyeb-sessions.newsession
      outputParameters:
      - type: object
        mapping: $.
