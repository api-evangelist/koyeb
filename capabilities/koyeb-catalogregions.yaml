naftiko: 1.0.0-alpha2
info:
  label: Koyeb Rest API — CatalogRegions
  description: 'Koyeb Rest API — CatalogRegions. 2 operations. Lead operation: List Region. Self-contained Naftiko capability
    covering one Koyeb business surface.'
  tags:
  - Koyeb
  - CatalogRegions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KOYEB_API_KEY: KOYEB_API_KEY
capability:
  consumes:
  - type: http
    namespace: koyeb-catalogregions
    baseUri: https://app.koyeb.com
    description: Koyeb Rest API — CatalogRegions business capability. Self-contained, no shared references.
    resources:
    - name: v1-catalog-regions
      path: /v1/catalog/regions
      operations:
      - name: listregions
        method: GET
        description: List Region
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: string
          description: (Optional) The number of items to return
        - name: offset
          in: query
          type: string
          description: (Optional) The offset in the list of item to return
        - name: id
          in: query
          type: string
          description: (Optional) A filter for regions
    - name: v1-catalog-regions-id
      path: /v1/catalog/regions/{id}
      operations:
      - name: getregion
        method: GET
        description: Get Region
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The name of the region
          required: true
  exposes:
  - type: rest
    namespace: koyeb-catalogregions-rest
    port: 8080
    description: REST adapter for Koyeb Rest API — CatalogRegions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/catalog/regions
      name: v1-catalog-regions
      description: REST surface for v1-catalog-regions.
      operations:
      - method: GET
        name: listregions
        description: List Region
        call: koyeb-catalogregions.listregions
        with:
          limit: rest.limit
          offset: rest.offset
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/catalog/regions/{id}
      name: v1-catalog-regions-id
      description: REST surface for v1-catalog-regions-id.
      operations:
      - method: GET
        name: getregion
        description: Get Region
        call: koyeb-catalogregions.getregion
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: koyeb-catalogregions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Koyeb Rest API — CatalogRegions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-region
      description: List Region
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: koyeb-catalogregions.listregions
      with:
        limit: tools.limit
        offset: tools.offset
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-region
      description: Get Region
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: koyeb-catalogregions.getregion
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
