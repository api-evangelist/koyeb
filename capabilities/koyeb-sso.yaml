naftiko: 1.0.0-alpha2
info:
  label: Koyeb Rest API — sso
  description: 'Koyeb Rest API — sso. 2 operations. Lead operation: sso. Self-contained Naftiko capability covering one Koyeb
    business surface.'
  tags:
  - Koyeb
  - sso
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KOYEB_API_KEY: KOYEB_API_KEY
capability:
  consumes:
  - type: http
    namespace: koyeb-sso
    baseUri: https://app.koyeb.com
    description: Koyeb Rest API — sso business capability. Self-contained, no shared references.
    resources:
    - name: v1-sso-canny
      path: /v1/sso/canny
      operations:
      - name: cannyauth
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: string
          required: true
    - name: v1-sso-discourse
      path: /v1/sso/discourse
      operations:
      - name: discourseauth
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: string
          required: true
  exposes:
  - type: rest
    namespace: koyeb-sso-rest
    port: 8080
    description: REST adapter for Koyeb Rest API — sso. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v1/sso/canny
      name: v1-sso-canny
      description: REST surface for v1-sso-canny.
      operations:
      - method: POST
        name: cannyauth
        description: cannyauth
        call: koyeb-sso.cannyauth
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/sso/discourse
      name: v1-sso-discourse
      description: REST surface for v1-sso-discourse.
      operations:
      - method: POST
        name: discourseauth
        description: discourseauth
        call: koyeb-sso.discourseauth
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: koyeb-sso-mcp
    port: 9090
    transport: http
    description: MCP adapter for Koyeb Rest API — sso. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: cannyauth
      description: cannyauth
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: koyeb-sso.cannyauth
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: discourseauth
      description: discourseauth
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: koyeb-sso.discourseauth
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
