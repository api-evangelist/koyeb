naftiko: 1.0.0-alpha2
info:
  label: Koyeb Rest API — CatalogDatacenters
  description: 'Koyeb Rest API — CatalogDatacenters. 1 operations. Lead operation: List datacenters. Self-contained Naftiko
    capability covering one Koyeb business surface.'
  tags:
  - Koyeb
  - CatalogDatacenters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KOYEB_API_KEY: KOYEB_API_KEY
capability:
  consumes:
  - type: http
    namespace: koyeb-catalogdatacenters
    baseUri: https://app.koyeb.com
    description: Koyeb Rest API — CatalogDatacenters business capability. Self-contained, no shared references.
    resources:
    - name: v1-catalog-datacenters
      path: /v1/catalog/datacenters
      operations:
      - name: listdatacenters
        method: GET
        description: List datacenters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: koyeb-catalogdatacenters-rest
    port: 8080
    description: REST adapter for Koyeb Rest API — CatalogDatacenters. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/catalog/datacenters
      name: v1-catalog-datacenters
      description: REST surface for v1-catalog-datacenters.
      operations:
      - method: GET
        name: listdatacenters
        description: List datacenters
        call: koyeb-catalogdatacenters.listdatacenters
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: koyeb-catalogdatacenters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Koyeb Rest API — CatalogDatacenters. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-datacenters
      description: List datacenters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: koyeb-catalogdatacenters.listdatacenters
      outputParameters:
      - type: object
        mapping: $.
