naftiko: 1.0.0-alpha2
info:
  label: Koyeb Rest API — DockerHelper
  description: 'Koyeb Rest API — DockerHelper. 1 operations. Lead operation: Verify Docker Image. Self-contained Naftiko capability
    covering one Koyeb business surface.'
  tags:
  - Koyeb
  - DockerHelper
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KOYEB_API_KEY: KOYEB_API_KEY
capability:
  consumes:
  - type: http
    namespace: koyeb-dockerhelper
    baseUri: https://app.koyeb.com
    description: Koyeb Rest API — DockerHelper business capability. Self-contained, no shared references.
    resources:
    - name: v1-docker-helper-verify
      path: /v1/docker-helper/verify
      operations:
      - name: verifydockerimage
        method: GET
        description: Verify Docker Image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: image
          in: query
          type: string
          description: The full image uri to be verified
        - name: secret_id
          in: query
          type: string
          description: (Optional) the id of the secret to use to authenticate to the registry
  exposes:
  - type: rest
    namespace: koyeb-dockerhelper-rest
    port: 8080
    description: REST adapter for Koyeb Rest API — DockerHelper. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/docker-helper/verify
      name: v1-docker-helper-verify
      description: REST surface for v1-docker-helper-verify.
      operations:
      - method: GET
        name: verifydockerimage
        description: Verify Docker Image
        call: koyeb-dockerhelper.verifydockerimage
        with:
          image: rest.image
          secret_id: rest.secret_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: koyeb-dockerhelper-mcp
    port: 9090
    transport: http
    description: MCP adapter for Koyeb Rest API — DockerHelper. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: verify-docker-image
      description: Verify Docker Image
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: koyeb-dockerhelper.verifydockerimage
      with:
        image: tools.image
        secret_id: tools.secret_id
      outputParameters:
      - type: object
        mapping: $.
